<svg viewBox="0 0 420 594" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <title>Cinematic 3-Strip Grid — Wide horizontal panels</title>

  <!-- Page background -->
  <rect width="420" height="594" fill="#f5f5f0" stroke="#333" stroke-width="1"/>

  <!-- 3 wide horizontal strips — margin 15px, gutter 10px -->
  <!-- Each strip height = (594 - 30 - 20) / 3 = 181.3 -->

  <!-- STRIP 1 — Establishing / wide shot -->
  <rect x="15" y="15" width="390" height="181" fill="white" stroke="#222" stroke-width="2"/>
  <text x="210" y="106" text-anchor="middle" fill="#aaa" font-size="14">Panel 1 — WIDE / ESTABLISHING</text>
  <text x="210" y="122" text-anchor="middle" fill="#ccc" font-size="10">Full scene introduction — landscape, city, world</text>

  <!-- STRIP 2 — Action / drama -->
  <rect x="15" y="206" width="390" height="181" fill="white" stroke="#222" stroke-width="2"/>
  <text x="210" y="297" text-anchor="middle" fill="#aaa" font-size="14">Panel 2 — ACTION / DRAMA</text>
  <text x="210" y="313" text-anchor="middle" fill="#ccc" font-size="10">Character action, confrontation, key dialogue</text>

  <!-- STRIP 3 — Close / emotional / exit -->
  <rect x="15" y="397" width="390" height="182" fill="white" stroke="#222" stroke-width="2"/>
  <text x="210" y="488" text-anchor="middle" fill="#aaa" font-size="14">Panel 3 — CLOSE / EMOTIONAL / EXIT</text>
  <text x="210" y="504" text-anchor="middle" fill="#ccc" font-size="10">Reaction close-up, detail, cliffhanger</text>

  <!-- Labels -->
  <text x="210" y="584" text-anchor="middle" fill="#888" font-size="9">bd-atelier • Cinematic 3-Strip Grid • Slow dramatic pacing</text>
</svg>
